name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/server
    steps:
      - uses: actions/checkout@v4

      - name: Remove local cargo config (uses mold linker not available in CI)
        run: rm -f .cargo/config.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src/server/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test --verbose

  dotnet-tests:
    name: .NET Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/plugins/jellyfin
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Copy JS files to plugin Web directory
        run: |
          mkdir -p JellyWatchParty/Web
          cp ../../clients/jellyfin-web/plugin.js JellyWatchParty/Web/plugin.js
          for f in state.js utils/time.js utils/video.js utils/misc.js utils/validation.js utils/media.js utils/log.js ui/styles.js ui/indicators.js ui/toasts.js ui/modal.js ui/cards.js ui/bridge.js ui/home.js ui/render.js playback/play.js playback/bind.js playback/sync.js playback/tracks.js chat/messages.js chat/input.js ws/send.js ws/auth.js ws/handlers/room.js ws/handlers/sync.js ws/handlers/playback.js ws/handlers/clock.js ws/connection.js app/lifecycle.js app/cleanup.js; do
            mkdir -p "JellyWatchParty/Web/$(dirname "$f")"
            cp "../../clients/jellyfin-web/$f" "JellyWatchParty/Web/$f"
          done

      - name: Restore dependencies
        run: dotnet restore JellyWatchParty.Tests/JellyWatchParty.Tests.csproj

      - name: Build
        run: dotnet build JellyWatchParty.Tests/JellyWatchParty.Tests.csproj --no-restore

      - name: Run tests
        run: dotnet test JellyWatchParty.Tests/JellyWatchParty.Tests.csproj --no-build --verbosity normal

  js-lint:
    name: JavaScript Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check JS syntax
        run: |
          while IFS= read -r file; do
            echo "Checking $file..."
            node --check "$file"
          done < <(find src/clients/jellyfin-web -name '*.js' -not -path '*/tests/*')

      - name: Run JS tests
        run: node --test src/clients/jellyfin-web/tests/*.test.js

  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    needs: [rust-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./src/server
          file: ./infra/docker/server.Dockerfile
          push: false
          tags: jellywatchparty/session-server:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
