name: Publish

on:
  push:
    branches: [main, develop]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tigamingtv/jwp-session-server
permissions:
  contents: write
  packages: write
  actions: write

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      server: ${{ steps.filter.outputs.server }}
      plugin: ${{ steps.filter.outputs.plugin }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'src/server/**'
            plugin:
              - 'src/plugins/jellyfin/**'
              - 'src/clients/jellyfin-web/**'

  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: changes
    if: always() && (github.event_name == 'release' || needs.changes.outputs.server == 'true')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Prepare platform pair
        run: |
          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./src/server
          file: ./infra/docker/server.Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          build-args: |
            BUILD_MODE=release

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge & Push Manifest
    runs-on: ubuntu-latest
    needs: build
    if: always() && needs.build.result == 'success'
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=beta,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=dev,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/develop' }}
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'release' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

  build-plugin:
    name: Build Jellyfin Plugin
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Copy JS files to plugin Web directory
        working-directory: src/plugins/jellyfin
        run: |
          mkdir -p JellyWatchParty/Web
          cp ../../clients/jellyfin-web/plugin.js JellyWatchParty/Web/plugin.js
          for f in state.js utils/time.js utils/video.js utils/misc.js utils/media.js utils/log.js ui/styles.js ui/indicators.js ui/toasts.js ui/modal.js ui/cards.js ui/bridge.js ui/home.js ui/render.js playback/play.js playback/bind.js playback/sync.js chat/messages.js chat/input.js ws/send.js ws/auth.js ws/handlers/room.js ws/handlers/sync.js ws/handlers/playback.js ws/handlers/clock.js ws/connection.js app/lifecycle.js app/cleanup.js; do
            mkdir -p "JellyWatchParty/Web/$(dirname "$f")"
            cp "../../clients/jellyfin-web/$f" "JellyWatchParty/Web/$f"
          done

      - name: Build plugin
        working-directory: src/plugins/jellyfin/JellyWatchParty
        run: dotnet publish -c Release -o dist

      - name: Create plugin zip
        run: |
          cd src/plugins/jellyfin/JellyWatchParty/dist
          zip -r ../JellyWatchParty-${{ github.event.release.tag_name }}.zip .

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: jellyfin-plugin
          path: src/plugins/jellyfin/JellyWatchParty/JellyWatchParty-${{ github.event.release.tag_name }}.zip

  build-windows-server:
    name: Build Windows Session Server
    runs-on: windows-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/server

      - name: Build release binary
        working-directory: src/server
        run: cargo build --release

      - name: Package Windows build
        shell: pwsh
        run: |
          $version = "${{ github.event.release.tag_name }}"
          $dest = "jwp-session-server-windows-$version"
          New-Item -ItemType Directory -Path $dest | Out-Null
          Copy-Item src/server/target/release/session-server.exe "$dest/session-server.exe"
          @"
          JellyWatchParty Session Server for Windows
          ===========================================

          No installation required. This is a standalone binary.

          1. (Optional) Set environment variables before launching, e.g. in
             PowerShell:
                 `$env:PORT = "3000"
                 `$env:ALLOWED_ORIGINS = "http://your-jellyfin:8096"
                 `$env:JWT_SECRET = "<32+ char secret, must match the Jellyfin plugin config>"
          2. Run session-server.exe (double-click, or from a terminal).
          3. Allow it through Windows Firewall when prompted so Jellyfin/clients
             can reach it on the configured port (default 3000).

          To run it in the background as a Windows service, use a wrapper such
          as NSSM (https://nssm.cc/) pointed at session-server.exe.

          Full docs: https://tigamingtv.github.io/JellyWatchParty/
          "@ | Out-File -Encoding utf8 "$dest/README.txt"
          Compress-Archive -Path "$dest/*" -DestinationPath "$dest.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-server
          path: jwp-session-server-windows-*.zip
          if-no-files-found: error

  create-release-assets:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    needs: [merge, build-plugin, build-windows-server]
    if: always() && github.event_name == 'release' && needs.merge.result == 'success' && needs.build-plugin.result == 'success' && needs.build-windows-server.result == 'success'
    steps:
      - name: Download plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: jellyfin-plugin
          path: artifacts

      - name: Download Windows server artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-server
          path: artifacts

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-plugin-manifest:
    name: Update Plugin Repository Manifest
    runs-on: ubuntu-latest
    needs: [build-plugin, create-release-assets]
    if: always() && github.event_name == 'release' && needs.build-plugin.result == 'success' && needs.create-release-assets.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: jellyfin-plugin
          path: artifacts

      - name: Update manifest.json
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"  # Remove 'v' prefix if present

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+(\.[0-9]+){0,2}$ ]]; then
            echo "::error::Release tag '$VERSION' is not a valid numeric version (expected e.g. 1.0.1). Aborting manifest update."
            exit 1
          fi

          ZIP_FILE=$(ls artifacts/*.zip | head -1)
          CHECKSUM=$(md5sum "$ZIP_FILE" | awk '{print $1}')
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          CHANGELOG="${{ github.event.release.body }}"
          # Escape special characters for JSON
          CHANGELOG=$(echo "$CHANGELOG" | jq -Rs '.')

          # Update manifest.json using jq
          jq --arg version "$VERSION" \
             --arg checksum "$CHECKSUM" \
             --arg timestamp "$TIMESTAMP" \
             --argjson changelog "$CHANGELOG" \
             '.[0].versions = [{
               "version": $version,
               "changelog": $changelog,
               "targetAbi": "10.11.11.0",
               "sourceUrl": "https://github.com/TIGamingTV/JellyWatchParty/releases/download/v\($version)/JellyWatchParty-v\($version).zip",
               "checksum": $checksum,
               "timestamp": $timestamp
             }] + .[0].versions' \
             docs/jellyfin-plugin-repo/manifest.json > manifest.tmp.json

          mv manifest.tmp.json docs/jellyfin-plugin-repo/manifest.json

      - name: Commit and push manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/jellyfin-plugin-repo/manifest.json
          git commit -m "Update plugin manifest for ${{ github.event.release.tag_name }}"
          git push

      - name: Trigger Pages rebuild
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/docs.yml/dispatches" \
            -d '{"ref":"main"}'

  build-plugin-dev:
    name: Build & Publish Develop Plugin
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop' && needs.changes.outputs.plugin == 'true'
    outputs:
      version: ${{ steps.package.outputs.version }}
      checksum: ${{ steps.package.outputs.checksum }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Copy JS files to plugin Web directory
        working-directory: src/plugins/jellyfin
        run: |
          mkdir -p JellyWatchParty/Web
          cp ../../clients/jellyfin-web/plugin.js JellyWatchParty/Web/plugin.js
          for f in state.js utils/time.js utils/video.js utils/misc.js utils/media.js utils/log.js ui/styles.js ui/indicators.js ui/toasts.js ui/modal.js ui/cards.js ui/bridge.js ui/home.js ui/render.js playback/play.js playback/bind.js playback/sync.js chat/messages.js chat/input.js ws/send.js ws/auth.js ws/handlers/room.js ws/handlers/sync.js ws/handlers/playback.js ws/handlers/clock.js ws/connection.js app/lifecycle.js app/cleanup.js; do
            mkdir -p "JellyWatchParty/Web/$(dirname "$f")"
            cp "../../clients/jellyfin-web/$f" "JellyWatchParty/Web/$f"
          done

      - name: Build plugin
        working-directory: src/plugins/jellyfin/JellyWatchParty
        run: dotnet publish -c Release -o dist

      - name: Package develop build
        id: package
        working-directory: src/plugins/jellyfin/JellyWatchParty
        run: |
          VERSION="0.0.${{ github.run_number }}"
          (cd dist && zip -r ../JellyWatchParty-dev.zip .)
          CHECKSUM=$(md5sum JellyWatchParty-dev.zip | awk '{print $1}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "checksum=$CHECKSUM" >> "$GITHUB_OUTPUT"

      - name: Publish rolling develop release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: develop-latest
          name: "Develop build #${{ github.run_number }}"
          body: |
            Automated development build from `develop` @ ${{ github.sha }}. Not for production use.

            Install via the dev plugin repository URL (see docs/development/release.md), not via manual sideload of this asset unless you know what you're doing.

            Latest commit: ${{ github.event.head_commit.message }}
          prerelease: true
          make_latest: false
          files: src/plugins/jellyfin/JellyWatchParty/JellyWatchParty-dev.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-dev-manifest:
    name: Update Develop Plugin Manifest
    runs-on: ubuntu-latest
    needs: build-plugin-dev
    if: needs.build-plugin-dev.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update manifest-dev.json
        run: |
          VERSION="${{ needs.build-plugin-dev.outputs.version }}"
          CHECKSUM="${{ needs.build-plugin-dev.outputs.checksum }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          CHANGELOG=$(printf '%s' "${{ github.event.head_commit.message }}" | jq -Rs '.')

          jq --arg version "$VERSION" \
             --arg checksum "$CHECKSUM" \
             --arg timestamp "$TIMESTAMP" \
             --argjson changelog "$CHANGELOG" \
             '.[0].versions = [{
               "version": $version,
               "changelog": $changelog,
               "targetAbi": "10.11.11.0",
               "sourceUrl": "https://github.com/TIGamingTV/JellyWatchParty/releases/download/develop-latest/JellyWatchParty-dev.zip",
               "checksum": $checksum,
               "timestamp": $timestamp
             }]' \
             docs/jellyfin-plugin-repo/manifest-dev.json > manifest-dev.tmp.json

          mv manifest-dev.tmp.json docs/jellyfin-plugin-repo/manifest-dev.json

      - name: Commit and push manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/jellyfin-plugin-repo/manifest-dev.json
          git commit -m "Update develop plugin manifest (build ${{ github.run_number }})"
          git push

      - name: Trigger Pages rebuild
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/docs.yml/dispatches" \
            -d '{"ref":"main"}'
