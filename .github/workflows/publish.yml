name: Publish

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/server/**'
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tigamingtv/owp-session-server
permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Prepare platform pair
        run: |
          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./src/server
          file: ./infra/docker/server.Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          build-args: |
            BUILD_MODE=release

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge & Push Manifest
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=beta,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=dev,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/develop' }}
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'release' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

  build-plugin:
    name: Build Jellyfin Plugin
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Copy JS files to plugin Web directory
        working-directory: src/plugins/jellyfin
        run: |
          mkdir -p OpenWatchParty/Web
          cp ../../clients/jellyfin-web/plugin.js OpenWatchParty/Web/plugin.js
          for f in state.js utils/time.js utils/video.js utils/misc.js utils/media.js utils/log.js ui/styles.js ui/indicators.js ui/toasts.js ui/cards.js ui/home.js ui/render.js playback/play.js playback/bind.js playback/sync.js chat/messages.js chat/input.js ws/send.js ws/auth.js ws/handlers/room.js ws/handlers/sync.js ws/handlers/playback.js ws/handlers/clock.js ws/connection.js app/lifecycle.js app/cleanup.js; do
            mkdir -p "OpenWatchParty/Web/$(dirname "$f")"
            cp "../../clients/jellyfin-web/$f" "OpenWatchParty/Web/$f"
          done

      - name: Build plugin
        working-directory: src/plugins/jellyfin/OpenWatchParty
        run: dotnet publish -c Release -o dist

      - name: Create plugin zip
        run: |
          cd src/plugins/jellyfin/OpenWatchParty/dist
          zip -r ../OpenWatchParty-${{ github.event.release.tag_name }}.zip .

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: jellyfin-plugin
          path: src/plugins/jellyfin/OpenWatchParty/OpenWatchParty-${{ github.event.release.tag_name }}.zip

  create-release-assets:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    needs: [merge, build-plugin]
    if: github.event_name == 'release'
    steps:
      - name: Download plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: jellyfin-plugin
          path: artifacts

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-plugin-manifest:
    name: Update Plugin Repository Manifest
    runs-on: ubuntu-latest
    needs: [build-plugin, create-release-assets]
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: jellyfin-plugin
          path: artifacts

      - name: Update manifest.json
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"  # Remove 'v' prefix if present
          ZIP_FILE=$(ls artifacts/*.zip | head -1)
          CHECKSUM=$(md5sum "$ZIP_FILE" | awk '{print $1}')
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          CHANGELOG="${{ github.event.release.body }}"
          # Escape special characters for JSON
          CHANGELOG=$(echo "$CHANGELOG" | jq -Rs '.')

          # Update manifest.json using jq
          jq --arg version "$VERSION" \
             --arg checksum "$CHECKSUM" \
             --arg timestamp "$TIMESTAMP" \
             --argjson changelog "$CHANGELOG" \
             '.[0].versions = [{
               "version": $version,
               "changelog": $changelog,
               "targetAbi": "10.11.11.0",
               "sourceUrl": "https://github.com/TIGamingTV/OpenWatchParty/releases/download/v\($version)/OpenWatchParty-v\($version).zip",
               "checksum": $checksum,
               "timestamp": $timestamp
             }] + .[0].versions' \
             docs/jellyfin-plugin-repo/manifest.json > manifest.tmp.json

          mv manifest.tmp.json docs/jellyfin-plugin-repo/manifest.json

      - name: Commit and push manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/jellyfin-plugin-repo/manifest.json
          git commit -m "Update plugin manifest for ${{ github.event.release.tag_name }}"
          git push
