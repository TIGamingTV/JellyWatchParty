services:
  session-server:
    build:
      context: ../../../src/server
      dockerfile: ../../infra/docker/server.Dockerfile
      args:
        BUILD_MODE: release
    container_name: owp-session-server
    ports:
      - "${SESSION_SERVER_PORT:-3000}:3000"
    environment:
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-3000}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:8096,https://localhost:8096}
      - JWT_SECRET=${JWT_SECRET:-}
      - JWT_AUDIENCE=${JWT_AUDIENCE:-OpenWatchParty}
      - JWT_ISSUER=${JWT_ISSUER:-Jellyfin}
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  plugin-builder:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    working_dir: /src
    network_mode: host
    profiles:
      - tools
    volumes:
      - ../../../src/plugins/jellyfin/OpenWatchParty:/src
    environment:
      - HOME=/tmp
      - DOTNET_CLI_HOME=/tmp/.dotnet
    command: dotnet publish -c Release -o /src/dist OpenWatchPartyPlugin.csproj
